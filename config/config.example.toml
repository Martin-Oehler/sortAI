# sortAI configuration
# Copy this file to config/config.toml and adjust the values.

# Folder to watch for incoming PDFs.
inbox = "C:/Users/Martin/Downloads/sortai-inbox"

# Root of your existing document archive.
archive = "C:/Users/Martin/Documents/archive"

# Directory containing the prompt markdown files (relative to project root).
prompts_dir = "prompts"

# Path to the decision log (JSON-lines format).
log_file = "logs/sortai.jsonl"

# Set to true to simulate all actions without moving any files.
dry_run = false

# Set to true to stage all processed files for human review instead of auto-moving them.
# Use 'sortai dashboard' to approve or reject staged files.
review_mode = false

# Maximum folder depth the navigation loop will traverse before stopping.
max_navigate_depth = 10

# File name to look for inside each folder as a human-written description.
# If found, its contents are shown to the LLM as extra context for that folder.
folder_description_filename = "folder-description.md"

# How many sub-folders to show as a preview for each listed folder (0 = disable).
subfolder_preview_count = 5

[lm_studio]
# Base URL of your LM Studio server.
base_url = "http://localhost:1234"

# Exact model identifier shown in LM Studio (e.g. "lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF").
model = "your-model-id-here"

# Sampling temperature (lower = more deterministic).
temperature = 0.2

# Maximum tokens to generate per completion.
max_tokens = 2048

# Context window size to request when loading the model (in tokens).
# Only effective when model_ttl is NOT set. When model_ttl is set, the model is
# JIT-loaded by LM Studio and context_length must be configured in LM Studio directly.
# context_length = 8192

# Seconds after first use before LM Studio auto-evicts the model.
# When set, sortAI skips explicit model loading so that LM Studio's TTL mechanism
# remains active. context_length must then be configured in LM Studio directly.
# model_ttl = 300

# Reasoning effort: "off", "low", "medium", "high", or "on".
# Defaults to the automatically chosen setting for the model. Not all models support this.
# reasoning = "on"

[dashboard]
# Port for the dashboard web server.
port = 8765

# Open the browser automatically when 'sortai dashboard' starts.
auto_open_browser = true

# Where to move files while awaiting review (default: inbox parent / "_review").
# staging_dir = "/path/to/_review"

# Where to move rejected files (default: inbox parent / "_rejected").
# rejected_dir = "/path/to/_rejected"
