<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sortAI Dashboard</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div id="header">
  <h1>sortAI Dashboard</h1>
  <span id="pending-badge"></span>
  <span id="conn-dot" title="Live connection"></span>
</div>

<div id="main">
  <!-- Left panel -->
  <div id="left">

    <!-- Needs Review -->
    <div id="review-section">
      <div id="review-header">
        <span id="review-title">⚠ Needs Review</span>
        <button id="accept-all-btn" onclick="acceptAll()">Accept All</button>
      </div>
      <div id="review-list"></div>
    </div>

    <!-- History -->
    <div id="history-section">
      <div id="history-header">
        <span id="history-title">History</span>
        <select id="filter-select" onchange="renderHistory()">
          <option value="all">All</option>
          <option value="accepted">Accepted</option>
          <option value="rejected">Rejected</option>
          <option value="error">Errors</option>
        </select>
      </div>
      <div id="history-list"></div>
    </div>

  </div>

  <!-- Divider -->
  <div id="divider"></div>

  <!-- Right panel -->
  <div id="right">
    <div id="preview-hint">Click a row to preview the PDF</div>
    <iframe id="pdf-frame" src="about:blank"></iframe>
    <div id="llm-panel"></div>
  </div>
</div>

<!-- Floating context menu -->
<div id="context-menu">
  <button onclick="inspectFromMenu()">🔍 Inspect LLM interaction</button>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
